# Veröffentlicht jeden Morgen automatisch den nächsten Artikel aus der
# Warteschlange (blog/queue/*.json) — KEIN API-Key nötig.
#
# Die Warteschlange wird wöchentlich gefüllt: Claude-Chat öffnen,
# „Neue Blog-Runde" sagen, 5 Entwürfe freigeben — Claude reiht sie ein.
# Ist die Warteschlange fast leer, legt der Workflow als Erinnerung
# automatisch ein GitHub-Issue an.
#
# Optional gibt es weiter die KI-Modi (brauchen das Secret ANTHROPIC_API_KEY):
# Actions → Run workflow → mode=evergreen oder mode=news.

name: Täglicher Blog-Artikel

on:
  schedule:
    # 04:30 UTC = 06:30 deutscher Sommerzeit / 05:30 Winterzeit
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "queue = nächster Artikel aus der Warteschlange (ohne API-Key); evergreen/news schreiben per Claude API"
        type: choice
        options: [queue, evergreen, news]
        default: queue

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-blog
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Abhängigkeiten installieren (nur KI-Modi)
        if: github.event.inputs.mode == 'evergreen' || github.event.inputs.mode == 'news'
        run: npm install --no-audit --no-fund --prefix scripts

      - name: Artikel veröffentlichen
        id: generate
        run: node scripts/generate-blog-post.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOG_MODE: ${{ github.event.inputs.mode || 'queue' }}

      - name: Committen und pushen
        if: steps.generate.outputs.published == 'true'
        env:
          TITLE: ${{ steps.generate.outputs.title }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "blog: ${TITLE:-Täglicher Artikel} (auto-publish)"
          for delay in 2 4 8 16 0; do
            if git push; then exit 0; fi
            if [ "$delay" = "0" ]; then exit 1; fi
            sleep "$delay"
            git pull --rebase
          done

      - name: Nachschub-Erinnerung anlegen, wenn Warteschlange fast leer
        if: steps.generate.outputs.remaining != '' && fromJSON(steps.generate.outputs.remaining) <= 1
        uses: actions/github-script@v7
        with:
          script: |
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "blog-nachschub",
            });
            if (open.length > 0) return; // Erinnerung existiert schon
            const remaining = ${{ steps.generate.outputs.remaining || 0 }};
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Blog-Nachschub: Zeit für 5 neue Artikel",
              body: [
                `Die Artikel-Warteschlange ist fast leer (noch ${remaining} Artikel).`,
                "",
                "So füllst du sie auf (ca. 10 Minuten):",
                "1. Neuen Claude-Code-Chat für dieses Repo öffnen",
                "2. Schreiben: **„Neue Blog-Runde — schreib mir 5 Artikel-Vorschläge"**",
                "3. Entwürfe lesen, freigeben (oder Änderungen wünschen)",
                "4. Claude reiht die freigegebenen Artikel in `blog/queue/` ein — fertig",
                "",
                "Danach erscheint wieder jeden Morgen automatisch ein Artikel.",
                "Dieses Issue kannst du schließen, sobald die Runde durch ist.",
              ].join("\n"),
              labels: ["blog-nachschub"],
            });

      - name: Bei Fehler ein Issue anlegen
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Täglicher Blog-Artikel fehlgeschlagen (${date})`,
              body: [
                "Der automatische Blog-Workflow ist fehlgeschlagen — heute wurde kein Artikel veröffentlicht.",
                "",
                `Details: ${runUrl}`,
                "",
                "Der Workflow läuft morgen automatisch wieder; manuell erneut starten geht über Actions → Run workflow.",
              ].join("\n"),
              labels: ["blog-automation"],
            });
