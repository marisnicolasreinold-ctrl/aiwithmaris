<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#05060c" />
<meta name="robots" content="noindex" />
<title>PulseCRM · Vertriebs-Cockpit — AI with Maris-Demo</title>
<meta name="description" content="Interaktive Demo: ein Kanban-Vertriebs-Cockpit mit Live-Pipeline, Drag-and-drop und KI-Vorschlägen." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2305060c'/%3E%3Cpath d='M6 22V14M13 22V8M20 22v-6M27 22V11' stroke='%235ef0ff' stroke-width='2.4' stroke-linecap='round'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Manrope:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#05060c;--bg2:#0b0a16;--cyan:#5ef0ff;--violet:#7c5cff;--pink:#ff5ea8;--green:#5cff9d;--amber:#ffcc55;
  --text:#eef1fa;--muted:rgba(238,241,250,.62);--line:rgba(238,241,250,.10);--focus:#5ef0ff;
  --display:'Sora',sans-serif;--body:'Manrope',sans-serif;--mono:'Space Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(closest-side at 10% 0%,rgba(124,92,255,.13),transparent 60%),radial-gradient(closest-side at 92% 6%,rgba(255,94,168,.08),transparent 60%)}
:focus-visible{outline:2px solid var(--focus);outline-offset:3px;border-radius:6px}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 22px;background:rgba(5,6,12,.72);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.back{color:var(--muted);text-decoration:none;font-size:.86rem;font-weight:600}.back:hover{color:var(--cyan)}
.ttl{font-family:var(--display);font-weight:700;font-size:1.04rem}.ttl .sub{color:var(--muted);font-weight:400;font-size:.84rem}
.wrap{max-width:1280px;margin:0 auto;padding:20px 22px 40px}
.bar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:18px}
.stat{padding:12px 16px;border-radius:14px;border:1px solid var(--line);background:linear-gradient(160deg,rgba(255,255,255,.045),rgba(255,255,255,.01))}
.stat .l{font-family:var(--mono);font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.stat .n{font-family:var(--display);font-weight:800;font-size:1.4rem;font-variant-numeric:tabular-nums}
.stat .n.grad{background:linear-gradient(110deg,var(--cyan),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent}
.spacer{flex:1}
.search{font-family:var(--body);font-size:.86rem;color:var(--text);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:24px;padding:10px 16px;min-width:180px}
.search:focus{outline:none;border-color:rgba(94,240,255,.5)}
.btn{font-family:var(--body);font-weight:600;font-size:.86rem;padding:10px 18px;border-radius:28px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);cursor:pointer;transition:border-color .2s ease,transform .2s ease}
.btn:hover{border-color:rgba(94,240,255,.5)}
.btn.primary{color:#04050a;background:linear-gradient(110deg,var(--cyan),var(--violet));border-color:transparent}
.btn.primary:hover{transform:translateY(-2px)}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:840px){.board{grid-template-columns:1fr}}
.col{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.02);padding:14px;min-height:120px;transition:border-color .2s ease,background .2s ease}
.col.drop{border-color:rgba(94,240,255,.6);background:rgba(94,240,255,.05)}
.col-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.col-h .nm{font-family:var(--display);font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:8px}
.col-h .nm i{width:9px;height:9px;border-radius:50%;display:inline-block}
.col-lead .nm i{background:var(--cyan)}.col-angebot .nm i{background:var(--violet)}.col-gewonnen .nm i{background:var(--green)}
.col-h .sum{font-family:var(--mono);font-size:.72rem;color:var(--muted)}
.col-h .cnt{font-family:var(--mono);font-size:.66rem;color:var(--muted);background:rgba(255,255,255,.06);border-radius:20px;padding:2px 8px;margin-left:6px}
.deal{background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.015));border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:10px;cursor:grab;transition:border-color .2s ease,transform .2s ease,box-shadow .2s ease}
.deal:hover{border-color:rgba(94,240,255,.45);transform:translateY(-2px)}
.deal.dragging{opacity:.5;cursor:grabbing}
.deal .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.deal .co{font-family:var(--display);font-weight:600;font-size:.95rem}
.deal .ct{font-size:.76rem;color:var(--muted);margin-top:1px}
.deal .am{font-family:var(--mono);font-size:.82rem;color:var(--cyan);white-space:nowrap}
.deal .sugg{display:flex;gap:7px;align-items:flex-start;margin-top:10px;padding:8px 10px;border-radius:9px;background:rgba(124,92,255,.08);border:1px solid rgba(124,92,255,.2);font-size:.74rem;color:#d6cbff}
.deal .sugg b{color:#fff;font-weight:600}
.deal .acts{display:flex;gap:6px;margin-top:10px}
.deal .acts button{font-family:var(--mono);font-size:.66rem;padding:5px 9px;border-radius:7px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);cursor:pointer;transition:color .2s ease,border-color .2s ease}
.deal .acts button:hover{color:var(--text);border-color:rgba(94,240,255,.4)}
.deal .acts .mv{margin-left:auto}
.empty-col{color:rgba(238,241,250,.3);font-style:italic;font-size:.8rem;text-align:center;padding:16px 0}
.chart-card{margin-top:18px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.02);padding:18px}
.chart-card h2{font-family:var(--display);font-weight:700;font-size:.95rem;margin-bottom:14px}
.bars{display:flex;align-items:flex-end;gap:18px;height:140px;padding-bottom:26px;position:relative}
.bars .b{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%;position:relative}
.bars .b .fill{width:100%;max-width:90px;border-radius:8px 8px 0 0;transition:height .6s cubic-bezier(.2,.7,.2,1);min-height:3px}
.bars .b.lead .fill{background:linear-gradient(180deg,var(--cyan),rgba(94,240,255,.3))}
.bars .b.angebot .fill{background:linear-gradient(180deg,var(--violet),rgba(124,92,255,.3))}
.bars .b.gewonnen .fill{background:linear-gradient(180deg,var(--green),rgba(92,255,157,.3))}
.bars .b .lbl{position:absolute;bottom:-24px;font-family:var(--mono);font-size:.68rem;color:var(--muted);white-space:nowrap}
.bars .b .val{font-family:var(--mono);font-size:.7rem;color:var(--text);margin-bottom:6px;font-variant-numeric:tabular-nums}
/* Dialog */
dialog{max-width:460px;width:92%;padding:0;border:1px solid var(--line);border-radius:18px;background:var(--bg2);color:var(--text)}
dialog::backdrop{background:rgba(3,4,9,.7);backdrop-filter:blur(5px)}
.dlg-h{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line)}
.dlg-h h3{font-family:var(--display);font-weight:700;font-size:1.1rem}
.dlg-b{padding:18px 22px;display:grid;gap:12px}
.dlg-b label{font-family:var(--mono);font-size:.72rem;color:var(--muted);display:block;margin-bottom:5px}
.dlg-b input,.dlg-b select,.dlg-b textarea{width:100%;font-family:var(--body);font-size:.9rem;color:var(--text);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.dlg-b input:focus,.dlg-b select:focus,.dlg-b textarea:focus{outline:none;border-color:rgba(94,240,255,.5)}
.dlg-b .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dlg-foot{display:flex;justify-content:space-between;gap:9px;padding:16px 22px;border-top:1px solid var(--line)}
.lg-close{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);font-size:1.2rem;cursor:pointer}
.del-link{background:none;border:none;color:var(--pink);cursor:pointer;font-size:.82rem}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="../beispiele.html">&larr; Zurück zu AI with Maris</a>
  <div class="ttl">PulseCRM <span class="sub">· Vertriebs-Cockpit</span></div>
  <button class="btn primary" id="addBtn">+ Deal</button>
</header>

<div class="wrap">
  <div class="bar">
    <div class="stat"><div class="l">Pipeline offen</div><div class="n grad" id="statOpen">€ 0</div></div>
    <div class="stat"><div class="l">Gewonnen</div><div class="n" id="statWon">€ 0</div></div>
    <div class="stat"><div class="l">Deals</div><div class="n" id="statCount">0</div></div>
    <span class="spacer"></span>
    <input class="search" id="search" type="search" placeholder="Suchen…" aria-label="Deals durchsuchen">
  </div>

  <div class="board" id="board"></div>

  <div class="chart-card">
    <h2>Pipeline nach Phase</h2>
    <div class="bars" id="bars"></div>
  </div>
</div>

<dialog id="dlg" aria-labelledby="dlgT">
  <form method="dialog" id="dealForm">
    <div class="dlg-h"><h3 id="dlgT">Deal</h3><button type="button" class="lg-close" data-close aria-label="Schließen">&times;</button></div>
    <div class="dlg-b">
      <div><label for="fCo">Firma *</label><input id="fCo" required></div>
      <div class="two">
        <div><label for="fCt">Ansprechpartner</label><input id="fCt" placeholder="optional"></div>
        <div><label for="fVal">Wert (€) *</label><input id="fVal" type="number" min="0" step="100" required></div>
      </div>
      <div><label for="fStage">Phase</label><select id="fStage"><option value="lead">Lead</option><option value="angebot">Angebot</option><option value="gewonnen">Gewonnen</option></select></div>
      <div><label for="fNote">Notiz</label><textarea id="fNote" rows="2" placeholder="optional"></textarea></div>
    </div>
    <div class="dlg-foot">
      <button type="button" class="del-link" id="delBtn" hidden>Löschen</button>
      <span style="flex:1"></span>
      <button type="button" class="btn" data-close>Abbrechen</button>
      <button type="submit" class="btn primary">Speichern</button>
    </div>
  </form>
</dialog>

<script>
"use strict";
const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const $=id=>document.getElementById(id);
const STAGES=[{id:'lead',name:'Lead'},{id:'angebot',name:'Angebot'},{id:'gewonnen',name:'Gewonnen'}];
const SEED=[
 {company:'Stadtwerke Nord AG',contact:'M. Berger',value:42000,stage:'lead',note:''},
 {company:'AcuraSens GmbH',contact:'S. Klein',value:18500,stage:'lead',note:''},
 {company:'Klärwerk West',contact:'T. Wolf',value:96000,stage:'angebot',note:'Angebot versendet'},
 {company:'eom solutions GmbH',contact:'A. Weber',value:31200,stage:'angebot',note:''},
 {company:'Alpenwasser AG',contact:'R. Huber',value:128000,stage:'gewonnen',note:''},
 {company:'SOMMER Messtechnik',contact:'L. Sommer',value:54300,stage:'gewonnen',note:''}
];
let deals = load();
let editId=null, filter='';

function load(){
  let d;
  try{ d=JSON.parse(localStorage.getItem('aiwm_pulsecrm')||'null'); }catch(e){ d=null; }
  if(!d){ d=SEED.map(x=>Object.assign({id:uid()},x)); }
  return d;
}
function save(){ try{ localStorage.setItem('aiwm_pulsecrm',JSON.stringify(deals)); }catch(e){} }
function uid(){ return 'd'+Math.random().toString(36).slice(2,9); }
function eur(n){ return '€ '+Number(n||0).toLocaleString('de-DE'); }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function suggest(d){
  if(d.stage==='lead') return d.value>=50000 ? 'Entscheider identifizieren und Discovery-Sprint anbieten.' : 'Kostenloses Erstgespräch terminieren.';
  if(d.stage==='angebot') return 'Nachfassen: offene Rückfragen klären und Entscheidungstermin setzen.';
  return 'Onboarding starten, Erfolg dokumentieren und um eine Referenz bitten.';
}

function render(){
  const f=filter.toLowerCase();
  const visible=deals.filter(d=>!f || (d.company+' '+(d.contact||'')).toLowerCase().includes(f));
  $('board').innerHTML=STAGES.map(s=>{
    const items=visible.filter(d=>d.stage===s.id);
    const sum=items.reduce((a,d)=>a+Number(d.value||0),0);
    return '<div class="col col-'+s.id+'" data-stage="'+s.id+'">'
      +'<div class="col-h"><span class="nm"><i></i>'+s.name+'<span class="cnt">'+items.length+'</span></span><span class="sum">'+eur(sum)+'</span></div>'
      +(items.length?items.map(dealHTML).join(''):'<div class="empty-col">leer</div>')
      +'</div>';
  }).join('');
  wireBoard();
  renderStats(); renderBars();
}
function dealHTML(d){
  return '<article class="deal" draggable="true" data-id="'+d.id+'">'
    +'<div class="top"><div><div class="co">'+esc(d.company)+'</div>'+(d.contact?'<div class="ct">'+esc(d.contact)+'</div>':'')+'</div>'
    +'<div class="am">'+eur(d.value)+'</div></div>'
    +(d.note?'<div class="ct" style="margin-top:6px">'+esc(d.note)+'</div>':'')
    +'<div class="sugg"><span aria-hidden="true">&#9889;</span><span><b>KI-Vorschlag:</b> '+esc(suggest(d))+'</span></div>'
    +'<div class="acts">'
      +'<button data-edit="'+d.id+'">Bearbeiten</button>'
      +'<button class="mv" data-move="'+d.id+'" data-dir="-1" aria-label="Phase zurück" title="Phase zurück">&#8592;</button>'
      +'<button data-move="'+d.id+'" data-dir="1" aria-label="Phase vor" title="Phase vor">&#8594;</button>'
    +'</div></article>';
}
function renderStats(){
  const open=deals.filter(d=>d.stage!=='gewonnen').reduce((a,d)=>a+ +d.value,0);
  const won=deals.filter(d=>d.stage==='gewonnen').reduce((a,d)=>a+ +d.value,0);
  $('statOpen').textContent=eur(open); $('statWon').textContent=eur(won); $('statCount').textContent=deals.length;
}
function renderBars(){
  const totals=STAGES.map(s=>({s,v:deals.filter(d=>d.stage===s.id).reduce((a,d)=>a+ +d.value,0)}));
  const max=Math.max(1,...totals.map(t=>t.v));
  $('bars').innerHTML=totals.map(t=>(
    '<div class="b '+t.s.id+'"><span class="val">'+eur(t.v)+'</span><div class="fill" style="height:'+(t.v/max*100)+'%"></div><span class="lbl">'+t.s.name+'</span></div>'
  )).join('');
}

/* Drag & drop + Buttons */
function wireBoard(){
  document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>openEdit(b.dataset.edit)));
  document.querySelectorAll('[data-move]').forEach(b=>b.addEventListener('click',()=>moveDeal(b.dataset.move,+b.dataset.dir)));
  document.querySelectorAll('.deal').forEach(el=>{
    el.addEventListener('dragstart',e=>{ el.classList.add('dragging'); e.dataTransfer.setData('text/plain',el.dataset.id); e.dataTransfer.effectAllowed='move'; });
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  });
  document.querySelectorAll('.col').forEach(col=>{
    col.addEventListener('dragover',e=>{ e.preventDefault(); col.classList.add('drop'); });
    col.addEventListener('dragleave',()=>col.classList.remove('drop'));
    col.addEventListener('drop',e=>{ e.preventDefault(); col.classList.remove('drop');
      const id=e.dataTransfer.getData('text/plain'); const d=deals.find(x=>x.id===id);
      if(d && d.stage!==col.dataset.stage){ d.stage=col.dataset.stage; save(); render(); } });
  });
}
function moveDeal(id,dir){
  const d=deals.find(x=>x.id===id); if(!d) return;
  const i=STAGES.findIndex(s=>s.id===d.stage); const ni=Math.max(0,Math.min(STAGES.length-1,i+dir));
  if(ni!==i){ d.stage=STAGES[ni].id; save(); render(); }
}

/* Dialog: Add / Edit */
const dlg=$('dlg');
function openAdd(){ editId=null; $('dlgT').textContent='Neuer Deal'; $('dealForm').reset(); $('fStage').value='lead'; $('delBtn').hidden=true; dlg.showModal(); $('fCo').focus(); }
function openEdit(id){ const d=deals.find(x=>x.id===id); if(!d) return; editId=id; $('dlgT').textContent='Deal bearbeiten';
  $('fCo').value=d.company; $('fCt').value=d.contact||''; $('fVal').value=d.value; $('fStage').value=d.stage; $('fNote').value=d.note||'';
  $('delBtn').hidden=false; dlg.showModal(); }
$('addBtn').addEventListener('click',openAdd);
$('delBtn').addEventListener('click',()=>{ if(editId){ deals=deals.filter(x=>x.id!==editId); save(); render(); } dlg.close(); });
$('dealForm').addEventListener('submit',e=>{
  const data={ company:$('fCo').value.trim(), contact:$('fCt').value.trim(), value:Math.max(0,Math.round(+$('fVal').value||0)), stage:$('fStage').value, note:$('fNote').value.trim() };
  if(!data.company){ e.preventDefault(); return; }
  if(editId){ Object.assign(deals.find(x=>x.id===editId),data); }
  else { deals.unshift(Object.assign({id:uid()},data)); }
  save(); render();
  // method=dialog schließt automatisch
});
dlg.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',()=>dlg.close()));
dlg.addEventListener('click',e=>{ if(e.target===dlg) dlg.close(); });
$('search').addEventListener('input',e=>{ filter=e.target.value; render(); });

render();
</script>
<script src="./app-i18n.js"></script>
</body>
</html>
